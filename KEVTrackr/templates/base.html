<!doctype html>
<title>{% block title %}{% endblock %} - Flaskr</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.1/dist/bootstrap-table.min.css">
<!-- Log Off Modal -->
<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="Log Off Confirmation" id="myModalLabel">Log Off Confirmation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to log off?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="window.location.href='{{ url_for('auth.logout') }}'">Log Off</button>
      </div>
    </div>
  </div>
</div>

<nav>
  <h1>
  <a href="{{ url_for('kev.index') }}">
    <img src="{{ url_for('static', filename='kevtrackrlogo.jpg') }}" alt="KEVTrackr" >
  </a>
</h1>
  <ul>
    {% if g.user %}
        <div class="dropdown">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          {{ g.user['username'] }}
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="{{ url_for('auth.profile') }}">Profile</a></li>
          <li><a class="dropdown-item" href="{{ url_for('companies.index') }}">My Vendors</a></li>
          <li><a class="dropdown-item" href="{{ url_for('companylist.companylist') }}">Company List</a></li>
          <!-- Log Off Modal Trigger -->
            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#myModal">
              Log Off
            </a>
        </ul>
        </div>
<!--      <li><span>{{ g.user['username'] }}</span>-->
<!--      <li><a href="{{ url_for('auth.logout') }}">Log Out</a>-->
    {% else %}
      <li><a href="{{ url_for('auth.register') }}">Register</a>
      <li><a href="{{ url_for('auth.login') }}">Log In</a>
    {% endif %}
  </ul>
</nav>
<section class="content">
   {% block breadcrumbs %}{% endblock %}
    <header>
<!--    {% block header %}{% endblock %}-->
  </header>
<!--  {% for message in get_flashed_messages() %}-->
<!--    <div class="flash">{{ message }}</div>-->
<!--  {% endfor %}-->
  {% block content %}{% endblock %}

<!-- jQuery (Bootstrap Table requires it) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

<!-- Bootstrap JS (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- Bootstrap Table JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.1/dist/bootstrap-table.min.js"></script>
